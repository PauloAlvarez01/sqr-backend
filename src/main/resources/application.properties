spring.application.name=sqr-backend

# Configuraciˇn de la Base de Datos
spring.datasource.url=jdbc:postgresql://localhost:5432/sqr_db
spring.datasource.username=usuario_sqr
spring.datasource.password=password_sqr
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
