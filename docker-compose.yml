version: '3.8'
services:
  db:
    image: postgres:15
    container_name: sqr-db
    restart: always
    environment:
      - POSTGRES_USER=usuario_sqr
      - POSTGRES_PASSWORD=password_sqr
      - POSTGRES_DB=sqr_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data